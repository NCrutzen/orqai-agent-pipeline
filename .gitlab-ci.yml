# DIST-07: GitLab CI template — validates manifests + runs /orq-agent:test + fails on ITRX-04 regression.
# Variables required (set as CI/CD variables, masked):
#   ORQ_API_KEY, ANTHROPIC_API_KEY, AGENT_KEY, DATASET_ID

stages:
  - validate
  - test

validate-manifests:
  stage: validate
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash grep jq
  script:
    - bash tests/scripts/validate-plugin-manifests.sh

orq-agent-test:
  stage: test
  image: node:20-bullseye
  needs: ["validate-manifests"]
  timeout: 30 minutes
  script:
    - npm install -g @anthropic-ai/claude-code
    - bash install.sh --tier test
    - |
      claude code \
        --headless \
        --api-key "$ANTHROPIC_API_KEY" \
        --prompt "/orq-agent:test --agent $AGENT_KEY --dataset $DATASET_ID" \
        | tee orq-test-output.txt
    - |
      # Fail on any ITRX-04 regression marker from results-analyzer.
      if grep -q "⚠️" orq-test-output.txt; then
        echo "Regression detected (ITRX-04). See orq-test-output.txt"
        exit 1
      fi
      echo "No regressions detected."
  artifacts:
    when: always
    paths:
      - orq-test-output.txt
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
