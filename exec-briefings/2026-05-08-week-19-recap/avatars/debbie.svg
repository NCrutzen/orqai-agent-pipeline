<g class="dolly-hair">
  <!-- Left big curl mass: starts under hat brim, flows past jaw, curls inward -->
  <path d="
    M 14 21
    Q 8 28 8 36
    Q 8 44 12 50
    Q 14 54 18 56
    Q 22 53 22 46
    Q 21 38 22 30
    Q 21 24 22 21 Z"
    fill="#f5d76e" stroke="#c9a73a" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Right big curl mass: mirror -->
  <path d="
    M 50 21
    Q 56 28 56 36
    Q 56 44 52 50
    Q 50 54 46 56
    Q 42 53 42 46
    Q 43 38 42 30
    Q 43 24 42 21 Z"
    fill="#f5d76e" stroke="#c9a73a" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Curl detail strokes (left) -->
  <path d="M 12 26 Q 10 34 13 42" stroke="#e6c45e" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <path d="M 16 30 Q 14 40 17 48" stroke="#e6c45e" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <!-- Curl detail strokes (right) -->
  <path d="M 52 26 Q 54 34 51 42" stroke="#e6c45e" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <path d="M 48 30 Q 50 40 47 48" stroke="#e6c45e" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- Front bangs peeking under the hat brim, centre -->
  <path d="
    M 22 21.5
    Q 26 24 32 23.5
    Q 38 24 42 21.5
    Q 38 22.8 32 22.6
    Q 26 22.8 22 21.5 Z"
    fill="#f5d76e" stroke="#c9a73a" stroke-width="0.3" stroke-linejoin="round"/>
</g>
<g class="cowboy-hat">
  <ellipse cx="32" cy="20.6" rx="23" ry="2" fill="rgba(60,30,10,0.18)" />
  <path d="M 7 19 Q 9 14.5 32 13.5 Q 55 14.5 57 19 Q 55 22 32 22.2 Q 9 22 7 19 Z"
    fill="#8a5a2b" stroke="#3a2510" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M 12 18 Q 22 15.5 32 15 Q 42 15.5 52 18"
    stroke="#a87a48" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M 18 17 Q 18 4 26 3 Q 32 6 38 3 Q 46 4 46 17 Z"
    fill="#9c6736" stroke="#3a2510" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M 26 4 Q 32 7.5 38 4"
    stroke="#5d3a1a" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <path d="M 19 15.5 Q 32 14.5 45 15.5 L 45 17.5 Q 32 16.5 19 17.5 Z" fill="#2e1a08"/>
  <g transform="translate(32 16.5)">
    <polygon points="0,-1.5 0.45,-0.45 1.5,-0.45 0.6,0.18 0.95,1.2 0,0.55 -0.95,1.2 -0.6,0.18 -1.5,-0.45 -0.45,-0.45"
      fill="#d9a441" stroke="#7a5310" stroke-width="0.15"/>
  </g>
  <path d="M 23 6 Q 24 10 23 14"
    stroke="rgba(255,240,210,0.35)" stroke-width="1" fill="none" stroke-linecap="round"/>
</g>
<g class="bust">
  <!-- Bust curves: two adjacent humps over the chest area -->
  <path d="
    M 14 56
    Q 18 48 24 50
    Q 28 52 32 51
    Q 36 52 40 50
    Q 46 48 50 56
    L 50 64
    L 14 64 Z"
    fill="#f55d81"/>

  <!-- Soft inner shadow line where the two forms meet (centre) -->
  <path d="M 32 51 Q 32 56 32 60"
    stroke="rgba(180,40,80,0.35)" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- Subtle shading on the underside of each curve -->
  <path d="M 18 54 Q 22 56 26 54" stroke="rgba(180,40,80,0.20)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  <path d="M 38 54 Q 42 56 46 54" stroke="rgba(180,40,80,0.20)" stroke-width="0.5" fill="none" stroke-linecap="round"/>

  <!-- Decorative blouse trim (hint of fringe / piping) -->
  <path d="M 14 56 Q 32 49 50 56"
    stroke="#fff" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</g>
<g class="lashes">
  <!-- Left eye lashes (3 short flicks) -->
  <path d="M 22 32.5 L 21 31.2" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M 24 32.2 L 24 30.8" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M 26 32.5 L 27 31.2" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Right eye lashes -->
  <path d="M 38 32.5 L 37 31.2" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M 40 32.2 L 40 30.8" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M 42 32.5 L 43 31.2" stroke="#1B0640" stroke-width="0.5" stroke-linecap="round"/>
</g>
<g class="lips">
  <!-- Upper lip -->
  <path d="
    M 28 39.5
    Q 30 38.5 32 39
    Q 34 38.5 36 39.5
    Q 34 40.5 32 40
    Q 30 40.5 28 39.5 Z"
    fill="#d63a5b"/>
  <!-- Lower lip (fuller) -->
  <path d="
    M 28 39.8
    Q 32 43 36 39.8
    Q 34 41.8 32 42.2
    Q 30 41.8 28 39.8 Z"
    fill="#e54a6c"/>
  <!-- Lip highlight -->
  <path d="M 30 40.5 Q 32 40.2 34 40.5"
    stroke="rgba(255,255,255,0.55)" stroke-width="0.35" fill="none" stroke-linecap="round"/>
</g></g></svg>